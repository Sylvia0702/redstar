<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>红星照耀中国 · 闯关</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, 'PingFang SC', 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f5f0eb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 12px 20px;
            /* 增加安全区适配 */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* ===== 登录页 ===== */
        #loginPage {
            max-width: 440px;
            width: 100%;
            background: #fffcf9;
            border-radius: 28px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.10);
            padding: 32px 24px 28px;
            margin: 20px auto;
            text-align: center;
            display: block;
            transition: opacity 0.3s;
        }
        #loginPage.hidden {
            display: none;
        }
        #loginPage h1 {
            font-size: 26px;
            color: #2c1810;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }
        #loginPage .sub {
            color: #8b6b5a;
            font-size: 15px;
            margin-bottom: 24px;
        }
        #loginPage .input-group {
            text-align: left;
            margin-bottom: 16px;
        }
        #loginPage .input-group label {
            display: block;
            font-weight: 600;
            color: #3d2a1e;
            margin-bottom: 4px;
            font-size: 14px;
        }
        #loginPage .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8ddd6;
            border-radius: 14px;
            font-size: 16px;
            background: #fcf8f5;
            transition: 0.2s;
            /* 手机输入框优化 */
            -webkit-appearance: none;
            appearance: none;
        }
        #loginPage .input-group input:focus {
            border-color: #c0392b;
            outline: none;
            background: #fff;
        }
        #loginPage .login-btn {
            width: 100%;
            padding: 16px;
            background: #c0392b;
            color: #fff;
            border: none;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 6px 20px rgba(192, 57, 43, 0.30);
            margin-top: 6px;
            /* 触摸优化 */
            touch-action: manipulation;
            -webkit-touch-callout: none;
        }
        #loginPage .login-btn:active {
            transform: scale(0.96);
            background: #a93226;
        }
        #loginPage .login-error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            min-height: 22px;
        }

        /* ===== 主应用 ===== */
        #appContainer {
            max-width: 820px;
            width: 100%;
            background: #fffcf9;
            border-radius: 28px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.10);
            padding: 20px 16px 16px;
            position: relative;
            overflow: hidden;
            display: none;
        }
        #appContainer.show {
            display: block;
        }
        #appContainer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #c0392b, #e74c3c, #f39c12, #c0392b);
            background-size: 300% 100%;
            animation: gradBar 4s ease infinite;
        }
        @keyframes gradBar {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        /* ===== 顶部栏 ===== */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin: 4px 0 14px;
            padding-bottom: 10px;
            border-bottom: 2px dashed #e8ddd6;
            gap: 6px;
        }
        .user-status {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 14px;
            color: #3d2a1e;
        }
        .user-status .badge {
            background: #c0392b;
            color: #fff;
            padding: 3px 12px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        .user-status .score {
            background: #fdf2e9;
            padding: 3px 14px;
            border-radius: 40px;
            font-weight: 600;
            color: #a04028;
            font-size: 14px;
            white-space: nowrap;
        }
        .user-status .user-name {
            font-weight: 600;
            color: #2c1810;
            font-size: 15px;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .right-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .right-actions .progress-text {
            font-size: 12px;
            color: #7a5f4e;
            font-weight: 500;
            white-space: nowrap;
        }
        .rank-btn {
            background: #f0e8e2;
            border: none;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            color: #3d2a1e;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            white-space: nowrap;
        }
        .rank-btn:active {
            background: #ddd0c7;
            transform: scale(0.95);
        }
        .logout-btn {
            background: transparent;
            border: 1px solid #d5c0b4;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            color: #6b4f3e;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
        }
        .logout-btn:active {
            background: #eee5df;
            transform: scale(0.95);
        }

        /* ===== 关卡标签（移动端横向滚动） ===== */
        .level-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 10px 0 16px;
            padding: 0 0 6px;
            scrollbar-width: none;
            /* Firefox隐藏滚动条 */;
        }
        .level-tabs::-webkit-scrollbar {
            display: none;
            /* Chrome/Safari隐藏 */;
        }
        .level-tab {
            padding: 8px 16px;
            border-radius: 40px;
            border: 2px solid #ddd0c7;
            background: #faf6f2;
            font-weight: 600;
            font-size: 13px;
            color: #6b4f3e;
            cursor: pointer;
            transition: 0.2s;
            flex: 0 0 auto;
            touch-action: manipulation;
            white-space: nowrap;
            user-select: none;
            -webkit-user-select: none;
        }
        .level-tab:active {
            transform: scale(0.94);
        }
        .level-tab.active {
            background: #c0392b;
            border-color: #c0392b;
            color: #fff;
            box-shadow: 0 4px 14px rgba(192, 57, 43, 0.25);
        }
        .level-tab.locked {
            opacity: 0.45;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }
        .level-tab.locked:active {
            transform: none;
        }
        .level-tab .check {
            margin-left: 3px;
            font-size: 13px;
        }

        /* ===== 题目区 ===== */
        .question-area {
            background: #fcf8f5;
            border-radius: 20px;
            padding: 18px 16px 16px;
            border: 1px solid #eee5df;
            margin-top: 2px;
            transition: all 0.2s;
        }
        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .q-number {
            font-weight: 700;
            color: #c0392b;
            font-size: 15px;
        }
        .q-chapter {
            color: #8b6b5a;
            font-size: 12px;
            background: #f0e8e2;
            padding: 2px 12px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .q-text {
            font-size: 17px;
            line-height: 1.7;
            color: #2c1810;
            margin-bottom: 16px;
            padding: 4px 0 2px;
            font-weight: 500;
            word-break: break-word;
        }

        /* ===== 选项（大触摸区域） ===== */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }
        .opt {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 14px;
            border: 2px solid #e8ddd6;
            background: #fffcf9;
            cursor: pointer;
            transition: 0.15s;
            font-size: 15px;
            line-height: 1.5;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            min-height: 52px;
        }
        .opt:active {
            transform: scale(0.97);
            border-color: #c0392b;
        }
        .opt.disabled {
            pointer-events: none;
            opacity: 0.7;
        }
        .opt .marker {
            width: 30px;
            min-width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f0e8e2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #5a3f2e;
            flex-shrink: 0;
        }
        .opt.selected .marker {
            background: #c0392b;
            color: #fff;
        }
        .opt.correct {
            border-color: #27ae60;
            background: #eafaf1;
        }
        .opt.correct .marker {
            background: #27ae60;
            color: #fff;
        }
        .opt.wrong {
            border-color: #e74c3c;
            background: #fdedeb;
        }
        .opt.wrong .marker {
            background: #e74c3c;
            color: #fff;
        }
        .opt.show-correct {
            border-color: #27ae60;
            background: #eafaf1;
        }
        .opt.show-correct .marker {
            background: #27ae60;
            color: #fff;
        }

        /* ===== 解析 ===== */
        .explanation {
            background: #f4ede8;
            border-radius: 14px;
            padding: 14px 16px;
            margin: 10px 0 16px;
            border-left: 5px solid #c0392b;
            font-size: 14px;
            line-height: 1.7;
            color: #2c1810;
            display: none;
        }
        .explanation.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .explanation strong {
            color: #c0392b;
        }

        /* ===== 按钮行 ===== */
        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 4px;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 40px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            min-height: 48px;
            min-width: 80px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active {
            transform: scale(0.95);
        }
        .btn-primary {
            background: #c0392b;
            color: #fff;
            box-shadow: 0 4px 16px rgba(192, 57, 43, 0.25);
        }
        .btn-primary:active {
            background: #a93226;
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #d5c0b4;
            color: #6b4f3e;
        }
        .btn-outline:active {
            background: #f0e8e2;
        }
        .btn-success {
            background: #27ae60;
            color: #fff;
            box-shadow: 0 4px 16px rgba(39, 174, 96, 0.25);
        }
        .btn-success:active {
            background: #1e8449;
        }

        /* ===== 完成页 ===== */
        .finish-box {
            text-align: center;
            padding: 20px 6px;
        }
        .finish-box .big-icon {
            font-size: 60px;
            margin-bottom: 8px;
        }
        .finish-box h2 {
            font-size: 24px;
            color: #2c1810;
            margin-bottom: 6px;
        }
        .finish-box p {
            font-size: 15px;
            color: #5a3f2e;
            max-width: 400px;
            margin: 6px auto;
        }
        .finish-box .final-score {
            font-size: 40px;
            font-weight: 800;
            color: #c0392b;
            margin: 12px 0;
        }
        .finish-box .btn {
            margin: 4px 6px;
        }

        /* ===== 排行榜模态框（移动端优化） ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.50);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            padding: 16px;
            animation: modalFade 0.25s ease;
        }
        @keyframes modalFade {
            from {
                opacity: 0;
                transform: scale(0.94);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: #fffcf9;
            border-radius: 28px;
            max-width: 520px;
            width: 100%;
            padding: 24px 20px 20px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.30);
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            margin: 12px;
        }
        .modal-box h2 {
            font-size: 22px;
            color: #2c1810;
            margin-bottom: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-box h2 .close-btn {
            background: none;
            border: none;
            font-size: 30px;
            cursor: pointer;
            color: #8b6b5a;
            padding: 0 8px;
            touch-action: manipulation;
            line-height: 1;
        }
        .modal-box h2 .close-btn:active {
            transform: scale(0.88);
        }
        .modal-box .subtitle {
            color: #8b6b5a;
            margin-bottom: 14px;
            font-size: 13px;
        }
        .rank-list {
            overflow-y: auto;
            flex: 1;
            padding-right: 2px;
            -webkit-overflow-scrolling: touch;
        }
        .rank-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 10px;
            border-bottom: 1px solid #eee5df;
            font-size: 15px;
            align-items: center;
        }
        .rank-item:last-child {
            border-bottom: none;
        }
        .rank-item .pos {
            font-weight: 700;
            color: #6b4f3e;
            width: 36px;
            flex-shrink: 0;
        }
        .rank-item .name {
            flex: 1;
            font-weight: 500;
            color: #2c1810;
            margin: 0 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .rank-item .scr {
            color: #c0392b;
            font-weight: 700;
            flex-shrink: 0;
        }
        .rank-item.me {
            background: #fdf2e9;
            border-radius: 10px;
            margin: 2px 0;
            padding: 10px 10px;
        }
        .no-rank {
            color: #8b6b5a;
            text-align: center;
            padding: 30px 0;
            font-size: 15px;
        }

        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            color: #b09585;
            font-size: 13px;
            padding: 16px 0 4px;
            border-top: 1px solid #eee5df;
            margin-top: 16px;
            width: 100%;
        }
        .footer strong {
            color: #8b6b5a;
            font-weight: 600;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c1810;
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            opacity: 0;
            transition: 0.35s ease;
            pointer-events: none;
            z-index: 9999;
            max-width: 88%;
            text-align: center;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== 移动端专项优化 ===== */
        @media (max-width: 640px) {
            body {
                padding: 8px 8px 16px;
            }
            #loginPage {
                padding: 28px 18px 24px;
                margin: 12px auto;
                border-radius: 24px;
            }
            #loginPage h1 {
                font-size: 22px;
            }
            #loginPage .input-group input {
                padding: 12px 14px;
                font-size: 15px;
                border-radius: 12px;
            }
            #loginPage .login-btn {
                padding: 14px;
                font-size: 17px;
            }

            #appContainer {
                padding: 14px 10px 12px;
                border-radius: 24px;
            }
            .top-bar {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 4px;
            }
            .user-status .user-name {
                max-width: 60px;
                font-size: 13px;
            }
            .user-status .badge {
                font-size: 10px;
                padding: 2px 10px;
            }
            .user-status .score {
                font-size: 12px;
                padding: 2px 10px;
            }
            .right-actions .progress-text {
                font-size: 11px;
            }
            .rank-btn {
                font-size: 12px;
                padding: 4px 12px;
            }
            .logout-btn {
                font-size: 11px;
                padding: 3px 10px;
            }

            .level-tabs {
                gap: 6px;
                margin: 6px 0 12px;
            }
            .level-tab {
                font-size: 12px;
                padding: 6px 14px;
            }

            .question-area {
                padding: 14px 12px 12px;
                border-radius: 16px;
            }
            .q-text {
                font-size: 16px;
                line-height: 1.6;
            }
            .q-number {
                font-size: 14px;
            }
            .q-chapter {
                font-size: 11px;
            }

            .opt {
                padding: 12px 14px;
                font-size: 14px;
                min-height: 46px;
                gap: 10px;
                border-radius: 12px;
            }
            .opt .marker {
                width: 26px;
                min-width: 26px;
                height: 26px;
                font-size: 12px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 14px;
                min-height: 44px;
                min-width: 64px;
                border-radius: 32px;
            }

            .explanation {
                font-size: 13px;
                padding: 12px 14px;
                border-radius: 12px;
            }

            .finish-box .big-icon {
                font-size: 48px;
            }
            .finish-box h2 {
                font-size: 20px;
            }
            .finish-box .final-score {
                font-size: 32px;
            }

            .modal-box {
                padding: 20px 16px 16px;
                border-radius: 24px;
                max-height: 85vh;
            }
            .modal-box h2 {
                font-size: 19px;
            }
            .rank-item {
                font-size: 14px;
                padding: 8px 8px;
            }
            .rank-item .pos {
                width: 30px;
            }

            .toast {
                font-size: 13px;
                padding: 10px 20px;
                bottom: 20px;
                max-width: 92%;
                white-space: normal;
            }

            .footer {
                font-size: 12px;
                padding: 12px 0 2px;
            }
        }

        @media (max-width: 400px) {
            .user-status .user-name {
                max-width: 50px;
                font-size: 12px;
            }
            .user-status .badge {
                font-size: 9px;
                padding: 2px 8px;
            }
            .user-status .score {
                font-size: 11px;
                padding: 2px 8px;
            }
            .level-tab {
                font-size: 11px;
                padding: 5px 10px;
            }
            .q-text {
                font-size: 15px;
            }
            .opt {
                font-size: 13px;
                padding: 10px 12px;
                min-height: 42px;
            }
            .btn {
                font-size: 13px;
                padding: 8px 16px;
                min-height: 40px;
                min-width: 56px;
            }
        }

        /* 针对刘海屏/安全区 */
        @supports (padding: max(0px)) {
            #appContainer,
            #loginPage {
                padding-left: max(16px, env(safe-area-inset-left));
                padding-right: max(16px, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>

    <!-- ===== 登录页 ===== -->
    <div id="loginPage">
        <h1>⭐ 红星照耀中国</h1>
        <div class="sub">名著知识闯关 · 200题</div>
        <div class="input-group">
            <label>📚 学号</label>
            <input type="text" id="studentIdInput" placeholder="请输入学号" autocomplete="off" inputmode="text">
        </div>
        <div class="input-group">
            <label>👤 姓名</label>
            <input type="text" id="studentNameInput" placeholder="请输入姓名" autocomplete="off">
        </div>
        <button class="login-btn" id="loginBtn">进入闯关 🚀</button>
        <div class="login-error" id="loginError"></div>
        <div class="footer" style="border-top:none;margin-top:24px;padding-top:0;">
            <strong>苏州市立达中学校</strong>
        </div>
    </div>

    <!-- ===== 主应用 ===== -->
    <div id="appContainer">

            { q: '朱德年近40前往____，对马克思主义和俄国革命产生兴趣。', o: ['上海', '北京', '广州', '武汉'], a: 0, e: '年近40前往上海。', ch: '第十篇·战争与和平' },
            { q: '1927年8月，朱德决定彻底断绝与国民党的关系，之后在反动派的追杀中死里逃生，获得"____"的罪名。', o: ['朱毛', '叛徒', '土匪', '赤匪'], a: 0, e: '获得"朱毛"的罪名（与毛泽东并称）。',
                ch: '第十篇·战争与和平' },
            { q: '1931年，在中华苏维埃第一次全国代表大会上，朱德被推选为____。', o: ['军委主席', '中央执行委员会主席', '红军总司令', '总政委'], a: 0, e: '被推选为军委主席。',
                ch: '第十篇·战争与和平' },
            { q: '斯诺在河滩后勒都待了3天，他与一位看马的老红军以及红军药剂师____交谈。', o: ['李德', '傅连暲', '马海德', '白求恩'], a: 0, e: '与红军药剂师李德交谈。', ch: '第十一篇·回到保安' },
            { q: '斯诺还注意到，在西北，共产党实行了____的政策。', o: ['回民自治', '民族平等', '宗教信仰自由', '土地改革'], a: 0, e: '实行了回民自治的政策。', ch: '第十一篇·回到保安' },
            { q: '斯诺以为俘虏的两个匪首就要被枪毙了，但____告诉他红军不杀被俘的团丁。', o: ['彭德怀', '毛泽东', '周恩来', '朱德'], a: 0, e: '彭德怀告诉他红军不杀被俘的团丁。',
                ch: '第十一篇·回到保安' },
            { q: '回保安后，斯诺又在外交部安顿下来，从9月底一直住到10月。斯诺收集了足够的传记材料，可以编写一本《红色中国名人录》，每天早上都有一个新的指挥员或苏维埃官员来供他访问。斯诺在保安过着平静而愉快的生活，他骑马、游泳、打网球，教会了独臂将军____打"拉米"。',
                o: ['蔡树藩', '贺炳炎', '余秋里', '彭绍辉'], a: 0, e: '教会了独臂将军蔡树藩打"拉米"。', ch: '第十一篇·回到保安' },
            { q: '斯诺在保安和____吃"西餐"等。', o: ['毛泽东', '周恩来', '彭德怀', '林祖涵'], a: 0, e: '和毛泽东吃"西餐"。', ch: '第十一篇·回到保安' },
            { q: '苏联的最大影响是作为一种活榜样，一种产生希望和信念的理想。中国共产党的很多领导人在____接受教育。', o: ['苏联', '法国', '德国', '日本'], a: 0, e: '很多领导人在苏联接受教育。',
                ch: '第十一篇·回到保安' },
            { q: '共产党基本上抛弃了中国的封建糟粕，借鉴俄国的思想或制度，分享俄国民革命的集体经验。但也因为____而遭到严重挫折。', o: ['过于依赖苏联经验', '内部斗争', '外部封锁', '经济困难'], a: 0,
                e: '因为过于依赖苏联经验而遭到严重挫折。', ch: '第十一篇·回到保安' },
        ];

        // ============================================================
        //  2. 全局状态
        // ============================================================
        const TOTAL = QUESTIONS.length;
        const PER_LEVEL = 50;
        const LEVELS = 4;

        let currentUser = null;
        let state = {
            currentLevel: 0,
            currentIndex: 0,
            answers: new Array(TOTAL).fill(null),
            correctCount: 0,
            totalAnswered: 0,
        };

        // DOM
        const loginPage = document.getElementById('loginPage');
        const appContainer = document.getElementById('appContainer');
        const studentIdInput = document.getElementById('studentIdInput');
        const studentNameInput = document.getElementById('studentNameInput');
        const loginError = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const rankBtn = document.getElementById('rankBtn');
        const rankModal = document.getElementById('rankModal');
        const closeRankBtn = document.getElementById('closeRankBtn');
        const rankList = document.getElementById('rankList');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const titleBadge = document.getElementById('titleBadge');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const answeredDisplay = document.getElementById('answeredDisplay');
        const levelTabs = document.getElementById('levelTabs');
        const questionArea = document.getElementById('questionArea');
        const toast = document.getElementById('toast');

        // ============================================================
        //  3. 数据持久化
        // ============================================================
        function getUsersData() {
            try { return JSON.parse(localStorage.getItem('redStarUsers')) || {}; } catch { return {}; }
        }

        function saveUsersData(users) {
            localStorage.setItem('redStarUsers', JSON.stringify(users));
        }

        function loadUserState(studentId) {
            const users = getUsersData();
            if (users[studentId] && users[studentId].state) return users[studentId].state;
            return null;
        }

        function saveCurrentUserState() {
            if (!currentUser) return;
            const users = getUsersData();
            if (!users[currentUser.studentId]) {
                users[currentUser.studentId] = { name: currentUser.name, state: {} };
            }
            users[currentUser.studentId].state = {
                currentLevel: state.currentLevel,
                currentIndex: state.currentIndex,
                answers: state.answers,
                correctCount: state.correctCount,
                totalAnswered: state.totalAnswered,
            };
            users[currentUser.studentId].name = currentUser.name;
            saveUsersData(users);
        }

        function getRanking() {
            const users = getUsersData();
            const list = [];
            for (const [id, data] of Object.entries(users)) {
                const score = data.state ? data.state.correctCount || 0 : 0;
                list.push({ studentId: id, name: data.name || id, score });
            }
            list.sort((a, b) => b.score - a.score);
            return list;
        }

        // ============================================================
        //  4. 登录/登出
        // ============================================================
        function doLogin() {
            const id = studentIdInput.value.trim();
            const name = studentNameInput.value.trim();
            if (!id) { loginError.textContent = '请输入学号'; return; }
            if (!name) { loginError.textContent = '请输入姓名'; return; }
            loginError.textContent = '';

            const saved = loadUserState(id);
            if (saved) {
                state = saved;
                while (state.answers.length < TOTAL) state.answers.push(null);
                state.answers = state.answers.slice(0, TOTAL);
            } else {
                state = {
                    currentLevel: 0,
                    currentIndex: 0,
                    answers: new Array(TOTAL).fill(null),
                    correctCount: 0,
                    totalAnswered: 0,
                };
            }

            currentUser = { studentId: id, name };
            saveCurrentUserState();

            loginPage.classList.add('hidden');
            appContainer.classList.add('show');
            userNameDisplay.textContent = `👤 ${name}`;
            renderAll();
            showToast(`欢迎，${name}！`);
        }

        function doLogout() {
            if (currentUser) saveCurrentUserState();
            currentUser = null;
            appContainer.classList.remove('show');
            loginPage.classList.remove('hidden');
            studentIdInput.value = '';
            studentNameInput.value = '';
            loginError.textContent = '';
            state = { currentLevel: 0, currentIndex: 0, answers: new Array(TOTAL).fill(null), correctCount: 0,
                totalAnswered: 0 };
            showToast('已退出');
        }

        // ============================================================
        //  5. 核心逻辑
        // ============================================================
        function getGlobalIndex(level, idx) { return level * PER_LEVEL + idx; }

        function getLevelQuestions(level) {
            const start = level * PER_LEVEL;
            const end = Math.min(start + PER_LEVEL, TOTAL);
            return QUESTIONS.slice(start, end);
        }

        function getCurrentQuestion() {
            const idx = getGlobalIndex(state.currentLevel, state.currentIndex);
            return QUESTIONS[idx] || null;
        }

        function isLevelCompleted(level) {
            const start = level * PER_LEVEL;
            const end = Math.min(start + PER_LEVEL, TOTAL);
            for (let i = start; i < end; i++) {
                if (state.answers[i] === null) return false;
            }
            return true;
        }

        function isLevelUnlocked(level) {
            if (level === 0) return true;
            return isLevelCompleted(level - 1);
        }

        function getTitle(score) {
            if (score >= 180) return '🏅 传奇领袖';
            if (score >= 140) return '⚔️ 战地英雄';
            if (score >= 100) return '📯 老红军';
            if (score >= 60) return '🔫 扛枪的';
            if (score >= 20) return '👣 小跟班';
            return '🪖 新兵蛋子';
        }

        function renderTabs() {
            const levelNames = ['第一关·探寻之路', '第二关·领袖风采', '第三关·长征史诗', '第四关·红星闪耀'];
            let html = '';
            for (let i = 0; i < LEVELS; i++) {
                const unlocked = isLevelUnlocked(i);
                const active = i === state.currentLevel ? 'active' : '';
                const locked = !unlocked ? 'locked' : '';
                const check = isLevelCompleted(i) ? ' ✅' : '';
                html += `<div class="level-tab ${active} ${locked}" data-level="${i}">${levelNames[i]} ${check}</div>`;
            }
            levelTabs.innerHTML = html;
            levelTabs.querySelectorAll('.level-tab').forEach(el => {
                el.addEventListener('click', function() {
                    const level = parseInt(this.dataset.level);
                    if (isLevelUnlocked(level)) {
                        state.currentLevel = level;
                        state.currentIndex = 0;
                        renderAll();
                    } else {
                        showToast('请先完成前一关！');
                    }
                });
                // 手机触摸反馈
                el.addEventListener('touchstart', function() {
                    if (!this.classList.contains('locked')) {
                        this.style.transform = 'scale(0.94)';
                    }
                }, { passive: true });
                el.addEventListener('touchend', function() {
                    this.style.transform = '';
                }, { passive: true });
            });
        }

        function renderQuestion() {
            const q = getCurrentQuestion();
            const idx = getGlobalIndex(state.currentLevel, state.currentIndex);
            const totalInLevel = getLevelQuestions(state.currentLevel).length;
            const answered = state.answers[idx] !== null;

            if (!q) {
                const isAllDone = isLevelCompleted(state.currentLevel);
                questionArea.innerHTML = `
                            <div class="finish-box">
                                <div class="big-icon">🎉</div>
                                <h2>第${state.currentLevel+1}关 完成！</h2>
                                <p>${isAllDone ? '你已闯过这一关！' : '还有题目未作答，请返回完成。'}</p>
                                ${state.currentLevel < LEVELS-1 ? `<button class="btn btn-primary" onclick="goNextLevel()">进入下一关 ➜</button>` : 
                                `<div style="margin-top:12px;"><button class="btn btn-success" onclick="resetAll()">🔄 重新挑战</button></div>`}
                                ${state.currentLevel === LEVELS-1 && isAllDone ? `<div class="final-score">🏆 ${state.correctCount} 分</div>` : ''}
                                <div style="margin-top:12px;">
                                    <button class="btn btn-outline" onclick="showRanking()">🏆 排行榜</button>
                                </div>
                            </div>
                        `;
                return;
            }

            const optLabels = ['A', 'B', 'C', 'D'];
            const selected = state.answers[idx];
            const showExp = selected !== null;

            let optHtml = q.o.map((opt, i) => {
                let cls = 'opt';
                if (selected !== null) cls += ' disabled';
                if (selected === i) cls += ' selected';
                if (showExp && i === q.a) cls += ' show-correct';
                if (showExp && selected === i && i !== q.a) cls += ' wrong';
                if (showExp && selected === i && i === q.a) cls += ' correct';
                return `<div class="${cls}" data-optindex="${i}">
                            <span class="marker">${optLabels[i]}</span>
                            <span>${opt}</span>
                        </div>`;
            }).join('');

            const expHtml = showExp ? `
                        <div class="explanation show">
                            <strong>📖 解析：</strong> ${q.e}
                            ${selected === q.a ? ' ✅ 回答正确！' : ' ❌ 正确答案是 ' + optLabels[q.a]}
                        </div>
                    ` : '';

            const progress = `${state.currentIndex+1} / ${totalInLevel}`;

            questionArea.innerHTML = `
                        <div class="q-header">
                            <span class="q-number">第 ${idx+1} 题</span>
                            <span class="q-chapter">${q.ch || ''}</span>
                            <span class="progress-text">${progress}</span>
                        </div>
                        <div class="q-text">${q.q}</div>
                        <div class="options">${optHtml}</div>
                        ${expHtml}
                        <div class="action-row">
                            <div>
                                ${state.currentIndex > 0 ? `<button class="btn btn-outline" onclick="prevQuestion()">⬅ 上一题</button>` : ''}
                            </div>
                            <div>
                                ${showExp ? `<button class="btn btn-primary" onclick="nextQuestion()">${state.currentIndex < totalInLevel-1 ? '下一题 ➜' : '完成关卡 🎯'}</button>` :
                                `<button class="btn btn-primary" disabled>请先作答</button>`}
                            </div>
                        </div>
                    `;

            if (!showExp) {
                questionArea.querySelectorAll('.opt').forEach(el => {
                    el.addEventListener('click', function() {
                        const optIdx = parseInt(this.dataset.optindex);
                        handleSelect(optIdx);
                    });
                    // 触摸反馈
                    el.addEventListener('touchstart', function() {
                        if (!this.classList.contains('disabled')) {
                            this.style.transform = 'scale(0.97)';
                        }
                    }, { passive: true });
                    el.addEventListener('touchend', function() {
                        this.style.transform = '';
                    }, { passive: true });
                });
            }

            // 为按钮添加触摸反馈
            questionArea.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('touchstart', function() {
                    this.style.transform = 'scale(0.95)';
                }, { passive: true });
                btn.addEventListener('touchend', function() {
                    this.style.transform = '';
                }, { passive: true });
            });
        }

        function renderStatus() {
            scoreDisplay.textContent = `🏆 ${state.correctCount} 分`;
            titleBadge.textContent = getTitle(state.correctCount);
            answeredDisplay.textContent = `已答 ${state.totalAnswered}/${TOTAL}`;
        }

        function renderAll() {
            renderTabs();
            renderQuestion();
            renderStatus();
            saveCurrentUserState();
        }

        function handleSelect(optIdx) {
            const idx = getGlobalIndex(state.currentLevel, state.currentIndex);
            if (state.answers[idx] !== null) return;
            const q = getCurrentQuestion();
            state.answers[idx] = optIdx;
            state.totalAnswered++;
            if (optIdx === q.a) state.correctCount++;
            saveCurrentUserState();
            renderAll();
            // 自动滚动到解析
            setTimeout(() => {
                const exp = document.querySelector('.explanation');
                if (exp) exp.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 150);
        }

        function nextQuestion() {
            const levelQs = getLevelQuestions(state.currentLevel);
            if (state.currentIndex < levelQs.length - 1) {
                state.currentIndex++;
                renderAll();
                document.getElementById('questionArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                if (isLevelCompleted(state.currentLevel)) {
                    if (state.currentLevel < LEVELS - 1) {
                        goNextLevel();
                    } else {
                        renderAll();
                        showToast('🎉 恭喜你完成全部关卡！');
                        setTimeout(() => showRanking(), 500);
                    }
                } else {
                    showToast('请完成本关所有题目！');
                }
            }
        }

        function prevQuestion() {
            if (state.currentIndex > 0) {
                state.currentIndex--;
                renderAll();
                document.getElementById('questionArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function goNextLevel() {
            if (state.currentLevel < LEVELS - 1) {
                state.currentLevel++;
                state.currentIndex = 0;
                renderAll();
                showToast(`🚩 进入第${state.currentLevel+1}关！`);
                document.getElementById('questionArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
                setTimeout(() => showRanking(), 400);
            }
        }

        function resetAll() {
            if (!currentUser) return;
            if (confirm('确定重新开始吗？进度将被清零。')) {
                state = { currentLevel: 0, currentIndex: 0, answers: new Array(TOTAL).fill(null), correctCount: 0,
                    totalAnswered: 0 };
                saveCurrentUserState();
                renderAll();
                showToast('🔄 已重置，重新开始！');
                document.getElementById('questionArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // ============================================================
        //  6. 排行榜
        // ============================================================
        function showRanking() {
            const ranking = getRanking();
            const me = currentUser ? currentUser.studentId : null;
            let html = '';
            if (ranking.length === 0) {
                html = '<div class="no-rank">暂无闯关者，快来挑战吧！</div>';
            } else {
                ranking.forEach((item, index) => {
                    const isMe = item.studentId === me;
                    const cls = isMe ? 'rank-item me' : 'rank-item';
                    const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index+1}`;
                    html += `<div class="${cls}">
                                <span class="pos">${medal}</span>
                                <span class="name">${item.name} ${isMe ? '（我）' : ''}</span>
                                <span class="scr">${item.score} 分</span>
                            </div>`;
                });
            }
            rankList.innerHTML = html;
            rankModal.classList.add('show');
            // 防止背景滚动
            document.body.style.overflow = 'hidden';
        }

        function closeRanking() {
            rankModal.classList.remove('show');
            document.body.style.overflow = '';
        }

        // ============================================================
        //  7. Toast
        // ============================================================
        let toastTimer = null;

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2200);
        }

        // ============================================================
        //  8. 事件绑定
        // ============================================================
        loginBtn.addEventListener('click', doLogin);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !appContainer.classList.contains('show')) {
                doLogin();
            }
        });
        logoutBtn.addEventListener('click', doLogout);
        rankBtn.addEventListener('click', showRanking);
        closeRankBtn.addEventListener('click', closeRanking);
        rankModal.addEventListener('click', (e) => {
            if (e.target === rankModal) closeRanking();
        });

        // 键盘快捷操作（手机外接键盘）
        document.addEventListener('keydown', (e) => {
            if (!appContainer.classList.contains('show')) return;
            if (e.key === 'ArrowRight' || e.key === 'Enter') {
                const btn = document.querySelector('.action-row .btn-primary:not(:disabled)');
                if (btn) btn.click();
            }
            if (e.key === 'ArrowLeft') {
                const btn = document.querySelector('.action-row .btn-outline');
                if (btn) btn.click();
            }
        });

        // 滑动切换（移动端手势）
        let touchStartX = 0;
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        document.addEventListener('touchend', (e) => {
            if (!appContainer.classList.contains('show')) return;
            const dx = e.changedTouches[0].screenX - touchStartX;
            const dy = e.changedTouches[0].screenY - touchStartY;
            // 水平滑动 > 60px 且垂直滑动小于水平滑动的一半
            if (Math.abs(dx) > 60 && Math.abs(dy) < Math.abs(dx) * 0.5) {
                if (dx < 0) {
                    // 左滑 → 下一题
                    const btn = document.querySelector('.action-row .btn-primary:not(:disabled)');
                    if (btn) btn.click();
                } else if (dx > 0) {
                    // 右滑 → 上一题
                    const btn = document.querySelector('.action-row .btn-outline');
                    if (btn) btn.click();
                }
            }
        }, { passive: true });

        // 初始化：确保登录页显示
        loginPage.classList.remove('hidden');
        appContainer.classList.remove('show');

        console.log('🌟 红星照耀中国 · 闯关已启动！共 ' + TOTAL + ' 题');
        console.log('📱 支持滑动切换题目，点击选项作答');
    </script>

</body>
